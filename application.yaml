apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: web-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/jms287/kubernetes-helm-argocd-gitops.git
    targetRevision: main
    path: web-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true